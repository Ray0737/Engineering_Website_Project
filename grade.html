<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPAX Goal Setter | Intania Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --psm-blue: #0d6efd;
            --psm-success: #198754;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1 0 auto;
            padding-top: 70px;
        }

        footer {
            flex-shrink: 0;
        }

        .fw-black {
            font-weight: 900;
        }

        .subject-card {
            background: white;
            border-radius: 20px;
            border: none;
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .subject-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
        }

        .grade-selector {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 5px;
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
            /* Allows buttons to wrap if space is tight */
        }

        .btn-grade {
            flex: 1;
            min-width: 35px;
            border: none;
            background: transparent;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 8px 0;
            border-radius: 8px;
            color: #6c757d;
        }

        .btn-grade.active {
            background: var(--psm-blue);
            color: white;
        }

        .gpa-hero {
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
            color: white;
            border-radius: 25px;
            padding: 40px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-md fixed-top bg-white border-bottom py-2">
        <div class="container-fluid px-3">
            <a class="navbar-brand d-flex align-items-center me-2" href="#" onclick="goHome()">
                <span class="fw-bold text-dark">Intania's Lab</span>
            </a>

            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon" style="width: 1.2em; height: 1.2em;"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">

                <div class="ms-auto d-flex flex-column flex-md-row align-items-md-center mt-3 mt-md-0 gap-2">
                    <div class="vr mx-2 d-none d-md-block"></div>
                    <hr class="d-md-none my-2 text-muted">
                    <button class="btn btn-outline-dark btn-sm rounded-pill px-3"
                        onclick="window.location.href='index.html'">
                        <i class="bi bi-house-door me-1"></i> Home
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-5 mt-5">
        <div class="container">
            <div class="row g-4">
                <div class="col-lg-12 mb-4">
                    <div class="gpa-hero shadow-lg">
                        <div class="row align-items-center">
                            <div class="col-md-4">
                                <span class="stat-label">Projected Semester GPA</span>
                                <div class="display-1 fw-black" id="totalGPA">0.00</div>
                            </div>
                            <div class="col-md-8 border-start border-white-50">
                                <div class="row">
                                    <div class="col-4">
                                        <span class="stat-label">Total Credits</span>
                                        <div class="h3 fw-bold" id="totalCredits">0</div>
                                    </div>
                                    <div class="col-4">
                                        <span class="stat-label">Total Points</span>
                                        <div class="h3 fw-bold" id="totalPoints">0.0</div>
                                    </div>
                                    <div class="col-4">
                                        <span class="stat-label">Subjects</span>
                                        <div class="h3 fw-bold" id="subCountDisplay">0</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 mb-4 d-flex justify-content-center">
                    <button class="btn btn-danger btn-sm py-2 rounded-pill fw-medium shadow-sm w-100"
                        style="max-width: 400px;" onclick="addSubject()">
                        <i class="bi bi-plus-lg me-1"></i>Add New Subject
                    </button>
                </div>

                <div class="col-lg-12">
                    <div id="subjectGrid" class="row g-3">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-top py-5 mt-5">
        <div class="container text-center">
            <p class="text-muted small mb-0">&copy; 2026 Intania Archive. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        let subjects = [];

        function addSubject(name = 'New Subject', credit = 1.5, collect = 50, qCount = 40) {
            const id = Date.now() + Math.random();
            // Changed push to unshift so new subjects appear at the TOP
            subjects.unshift({ id, name, credit, collect, qCount, targetGrade: 4.0 });
            render();
        }

        function updateSubject(id, field, value) {
            const sub = subjects.find(s => s.id === id);
            if (sub) {
                sub[field] = (field === 'name') ? value : parseFloat(value) || 0;
                updateCalculationsOnly();
                updateCardUI(id);
            }
        }

        function updateCalculationsOnly() {
            let totalWeightedPoints = 0;
            let totalCredits = 0;

            subjects.forEach(sub => {
                totalWeightedPoints += (sub.targetGrade * sub.credit);
                totalCredits += sub.credit;
            });

            const finalGPA = totalCredits > 0 ? (totalWeightedPoints / totalCredits).toFixed(2) : "0.00";
            document.getElementById('totalGPA').innerText = finalGPA;
            document.getElementById('totalCredits').innerText = totalCredits;
            document.getElementById('totalPoints').innerText = totalWeightedPoints.toFixed(1);
            document.getElementById('subCountDisplay').innerText = subjects.length;
        }

        function updateCardUI(id) {
            const sub = subjects.find(s => s.id === id);
            const cardElement = document.querySelector(`[data-id="${id}"]`);
            if (!cardElement || !sub) return;

            const cardBody = cardElement.querySelector('.target-container');

            // Expanded Thresholds to include 1.5, 1.0, and 0.0
            const gradeThresholds = {
                4.0: 79.5, 3.5: 74.5, 3.0: 69.5, 2.5: 64.5,
                2.0: 59.5, 1.5: 54.5, 1.0: 49.5, 0.0: 0
            };

            const neededTotal = gradeThresholds[sub.targetGrade];
            const neededFromFinal = Math.max(0, neededTotal - sub.collect);
            const itemsNeeded = Math.ceil((neededFromFinal / 40) * sub.qCount);
            const isPossible = itemsNeeded <= sub.qCount;

            cardBody.className = `target-container p-3 rounded-4 ${isPossible ? 'bg-primary-subtle text-primary' : 'bg-danger-subtle text-danger'}`;
            cardBody.innerHTML = `
                <div class="d-flex justify-content-between align-items-center">
                    <span class="small fw-bold">${isPossible ? 'Required for Final:' : 'Impossible Target'}</span>
                    <span class="h5 fw-black mb-0">${isPossible ? itemsNeeded + ' / ' + sub.qCount : '!!!'}</span>
                </div>
            `;
        }

        function render() {
            const grid = document.getElementById('subjectGrid');
            grid.innerHTML = '';

            subjects.forEach(sub => {
                const div = document.createElement('div');
                div.className = "col-md-6 col-xl-4";
                div.setAttribute('data-id', sub.id);

                div.innerHTML = `
                    <div class="card subject-card shadow-sm p-4">
                        <div class="d-flex justify-content-between mb-3">
                            <input type="text" class="fw-bold border-0 bg-transparent" value="${sub.name}" oninput="updateSubject(${sub.id}, 'name', this.value)">
                            <button class="btn btn-link text-danger p-0" onclick="removeSubject(${sub.id})"><i class="bi bi-x-circle-fill"></i></button>
                        </div>
                        
                        <div class="row g-2 mb-3">
                            <div class="col-4">
                                <label class="stat-label">Credits</label>
                                <input type="number" class="form-control form-control-sm" value="${sub.credit}" oninput="updateSubject(${sub.id}, 'credit', this.value)">
                            </div>
                            <div class="col-4">
                                <label class="stat-label">Collect</label>
                                <input type="number" class="form-control form-control-sm" value="${sub.collect}" oninput="updateSubject(${sub.id}, 'collect', this.value)">
                            </div>
                            <div class="col-4">
                                <label class="stat-label">Final Qs</label>
                                <input type="number" class="form-control form-control-sm" value="${sub.qCount}" oninput="updateSubject(${sub.id}, 'qCount', this.value)">
                            </div>
                        </div>

                        <label class="stat-label mb-2">Desired Grade Target</label>
                        <div class="grade-selector mb-3">
                            ${[4.0, 3.5, 3.0, 2.5, 2.0, 1.5, 1.0, 0.0].map(g => `
                                <button class="btn-grade ${sub.targetGrade === g ? 'active' : ''}" 
                                    onclick="setGrade(${sub.id}, ${g})">${g}</button>
                            `).join('')}
                        </div>

                        <div class="target-container"></div>
                    </div>
                `;
                grid.appendChild(div);
                updateCardUI(sub.id);
            });
            updateCalculationsOnly();
        }

        function setGrade(id, g) {
            const sub = subjects.find(s => s.id === id);
            if (sub) {
                sub.targetGrade = g;
                render();
            }
        }

        function removeSubject(id) {
            subjects = subjects.filter(s => s.id !== id);
            render();
        }

        window.onload = () => {
            // Initial items
            addSubject('Thai 8', 1.0, 50, 60);
            addSubject('Social Studies 8', 1.0, 50, 60);
            addSubject('English 8', 1.0, 50, 70);
            addSubject('Science 8', 1.0, 50, 50);
            addSubject('Math 8', 1, 50, 25);
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
