<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Intania Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-md fixed-top bg-white border-bottom py-2">
        <div class="container-fluid px-3">
            <a class="navbar-brand d-flex align-items-center me-2" href="#" onclick="goHome()">
                <span class="fw-bold text-dark">Intania's Lab</span>
            </a>

            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon" style="width: 1.2em; height: 1.2em;"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">

                <div class="ms-auto d-flex flex-column flex-md-row align-items-md-center mt-3 mt-md-0 gap-2">
                    <div class="vr mx-2 d-none d-md-block"></div>
                    <hr class="d-md-none my-2 text-muted">
                    <button class="btn btn-outline-dark btn-sm rounded-pill px-3"
                        onclick="window.location.href='index.html'">
                        <i class="bi bi-house-door me-1"></i> Home
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card p-5 shadow-sm" style="max-width: 450px; width: 100%;">
            <h2 class="text-center fw-bold mb-4">Welcome Back</h2>

            <div class="mb-3">
                <label class="form-label small fw-bold">Email Address</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="name@example.com">
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" id="loginPass" class="form-control" placeholder="••••••••">
            </div>

            <div id="errorMsg" class="alert alert-danger d-none small py-2 mt-3 text-center rounded-pill"></div>

            <button id="loginBtn" class="btn btn-primary w-100 rounded-pill fw-bold mt-3">
                Sign In
            </button>

            <div class="text-center mt-3">
                <a href="register.html" class="small fw-bold text-decoration-none">Create an Account</a>
            </div>
        </div>
    </div>
</body>

</html>
