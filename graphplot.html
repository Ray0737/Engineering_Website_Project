<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intania Lab | Multi-Graph Plotter</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/janyas/line-seed-sans-th@latest/line-seed-sans-th.css');
        @import url('https://bit.ly/3CZa0Sz');
        @import url('https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css');

        :root {
            --accent-color: #0d6efd;
            --primary-color: #0d6efd;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --bg-soft: #fbfbfb;
            --card-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.08);
            --card-shadow-hover: 0 20px 40px -12px rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: 'line_seed_sans_th', 'Inter', Arial, sans-serif;
            background-color: var(--bg-soft);
            color: #1a1d20;
            -webkit-font-smoothing: antialiased;
        }

        .fw-black {
            font-weight: 800;
        }

        .plotter-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .input-section {
            background-color: #fff;
            border-right: 1px solid #eee;
            max-height: 80vh;
            overflow-y: auto;
        }

        .equation-row {
            background: #fbfbfb;
            border: 1px solid #eee;
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 1rem;
            position: relative;
        }

        .color-pill {
            width: 4px;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            border-radius: 4px 0 0 4px;
        }

        #chartWrapper {
            position: relative;
            height: 600px;
            width: 100%;
            padding: 20px;
        }

        .form-control {
            border-radius: 0.5rem;
            border: 1px solid #eee;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
        }

        .btn-add {
            border: 2px dashed #ddd;
            color: #888;
            transition: all 0.2s;
        }

        .btn-add:hover {
            border-color: #0d6efd;
            color: #0d6efd;
            background: #f0f7ff;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg fixed-top bg-white border-bottom py-2">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <div class="bg-dark text-white rounded-3 px-2 py-1 me-2 fw-bold">E</div>
                <span class="fw-bold text-dark">Intania @psm<span class="text-primary">_</span></span>
            </a>
            <div class="ms-auto d-flex align-items-center">
                <a href="index.html" class="btn btn-outline-secondary btn-sm rounded-pill me-2 px-3">
                    <i class="bi bi-house-door"></i>
                </a>
                <button class="btn btn-primary btn-sm rounded-pill px-3 fw-bold" onclick="generatePlots()">
                    <i class="bi bi-play-fill me-1"></i> Update All
                </button>
            </div>
        </div>
    </nav>

    <main class="container-fluid pt-5 mt-5 px-lg-5">
        <div class="row pt-2 mb-4">
            <div class="col-12">
                <h2 class="fw-black mb-1">Multi-Function <span class="text-primary">Workspace</span></h2>
            </div>
        </div>

        <div class="card plotter-card bg-white">
            <div class="row g-0">
                <div class="col-lg-4 p-4 input-section">
                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <label class="small fw-bold text-muted">X-MIN</label>
                            <input type="number" id="xMin" class="form-control form-control-sm" value="-10">
                        </div>
                        <div class="col-6">
                            <label class="small fw-bold text-muted">X-MAX</label>
                            <input type="number" id="xMax" class="form-control form-control-sm" value="10">
                        </div>
                    </div>

                    <div id="equationContainer">
                    </div>

                    <button class="btn btn-add w-100 py-3 rounded-4 mt-2 mb-4" onclick="addEquationRow()">
                        <i class="bi bi-plus-circle-dotted me-2"></i>Add New Function
                    </button>

                    <div class="p-3 bg-light rounded-4 small text-secondary">
                        <strong>Engineering Syntax:</strong><br>
                        <code>x^3</code>, <code>abs(x)</code>, <code>log(x)</code>, <code>exp(x)</code>
                    </div>
                </div>

                <div class="col-lg-8 border-start">
                    <div id="chartWrapper">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let chartInstance = null;
        let equationCount = 0;
        const colors = ['#0d6efd', '#dc3545', '#198754', '#ffc107', '#6f42c1', '#fd7e14'];

        function addEquationRow(value = "") {
            equationCount++;
            const color = colors[(equationCount - 1) % colors.length];
            const container = document.getElementById('equationContainer');

            const div = document.createElement('div');
            div.className = 'equation-row';
            div.id = `row-${equationCount}`;
            div.innerHTML = `
                <div class="color-pill" style="background: ${color}"></div>
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="badge text-dark p-0 small fw-bold">FUNCTION #${equationCount}</span>
                    <button class="btn btn-link btn-sm text-danger p-0" onclick="removeRow(${equationCount})">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
                <div class="input-group">
                    <span class="input-group-text border-0 bg-transparent ps-0 fw-bold text-muted">y =</span>
                    <input type="text" class="form-control equation-input border-0 bg-white" 
                           placeholder="Enter equation..." value="${value}">
                </div>
            `;
            container.appendChild(div);
            if (chartInstance) generatePlots();
        }

        function removeRow(id) {
            const row = document.getElementById(`row-${id}`);
            if (document.querySelectorAll('.equation-row').length > 1) {
                row.remove();
                generatePlots();
            }
        }

        function generatePlots() {
            const minX = parseFloat(document.getElementById('xMin').value);
            const maxX = parseFloat(document.getElementById('xMax').value);
            const inputs = document.querySelectorAll('.equation-input');
            const datasets = [];

            // Create X labels (300 points for smoothness)
            const xLabels = [];
            const points = 300;
            const step = (maxX - minX) / points;
            for (let i = 0; i <= points; i++) xLabels.push((minX + (i * step)).toFixed(2));

            inputs.forEach((input, index) => {
                const equation = input.value;
                if (!equation) return;

                try {
                    const expr = math.compile(equation);
                    const yData = xLabels.map(x => expr.evaluate({ x: parseFloat(x) }));

                    datasets.push({
                        label: `y = ${equation}`,
                        data: yData,
                        borderColor: colors[index % colors.length],
                        backgroundColor: 'transparent',
                        borderWidth: 2.5,
                        pointRadius: 0,
                        tension: 0.3
                    });
                } catch (e) {
                    console.error("Invalid equation at index", index);
                }
            });

            renderChart(xLabels, datasets);
        }

        function renderChart(labels, datasets) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: { position: 'top', labels: { font: { weight: 'bold' } } },
                        tooltip: { enabled: true }
                    },
                    scales: {
                        x: { ticks: { maxTicksLimit: 12 } },
                        y: { grid: { color: '#f0f0f0' } }
                    }
                }
            });
        }

        // Initialize with default functions
        window.onload = () => {
            addEquationRow("y=x^2");
            generatePlots();
        };
    </script>
</body>

</html>
